services:
  app:
    image: thelp281/liventcord:latest
    ports:
      - "5005:5005"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - AppSettings__SqlitePath=/app/data/liventcord.db
      - AppSettings__SqliteCachePath=/app/data/cache.db
      - AppSettings__FrontendUrl=http://localhost
      - AppSettings__RedisConnectionString=redis://redis:6379
    volumes:
      - ./data:/app/data
    networks:
      - shared_network
    depends_on:
      - redis
    extra_hosts:
      - "localhost:host-gateway"

  ws-api:
    image: thelp281/liventcord-ws-api:latest
    ports:
      - "8080:8080"
    networks:
      - shared_network
    depends_on:
      - redis
    environment:
      - RedisURI=redis://redis:6379
    extra_hosts:
      - "localhost:host-gateway"

  media-api:
    image: thelp281/liventcord-media-api:latest
    ports:
      - "5000:5000"
    environment:
      - AdminPassword=admin
    networks:
      - shared_network
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - media-cache:/app/cache

  redis:
    image: redis:latest
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    read_only: true
    ports:
      - "6379:6379"
    security_opt:
      - no-new-privileges:true
    networks:
      - shared_network
    extra_hosts:
      - "localhost:host-gateway"

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - shared_network
    depends_on:
      - app
      - ws-api

networks:
  shared_network:
    driver: bridge

volumes:
  media-cache: